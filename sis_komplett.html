<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIS AI Learning</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0F6E56;--teal-m:#1D9E75;--teal-l:#E1F5EE;--teal-d:#085041;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --coral:#993C1D;--coral-l:#FAECE7;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --gray:#2C2C2A;--gray-m:#73726C;--gray-l:#F1EFE8;--gray-ll:#F8F7F2;
  --green:#3B6D11;--green-l:#EAF3DE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --border:#E0DED6;--surface:#fff;
  --r:12px;--rs:8px;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--gray-ll);color:var(--gray);font-size:14px;line-height:1.5;}

/* ── SHARED ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--sans);}
.btn-teal{background:var(--teal);color:#fff;} .btn-teal:hover{background:var(--teal-m);}
.btn-purple{background:var(--purple);color:#fff;} .btn-purple:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--gray);border:1.5px solid var(--border);} .btn-ghost:hover{border-color:var(--teal);color:var(--teal);}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.pill-teal{background:var(--teal-l);color:var(--teal);}
.pill-purple{background:var(--purple-l);color:var(--purple);}
.pill-green{background:var(--green-l);color:var(--green);}
.pill-amber{background:var(--amber-l);color:var(--amber);}
.pill-coral{background:var(--coral-l);color:var(--coral);}
.pill-gray{background:var(--gray-l);color:var(--gray-m);}
.pill-red{background:var(--red-l);color:var(--red);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.card-title{font-size:11px;font-weight:600;color:var(--gray-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
.alert{border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:8px;border-left:3px solid;}
.alert-red{background:var(--red-l);color:var(--red);border-color:var(--red);}
.alert-amber{background:var(--amber-l);color:var(--amber);border-color:var(--amber);}
.alert-green{background:var(--green-l);color:var(--green);border-color:var(--green);}
.alert-teal{background:var(--teal-l);color:var(--teal);border-color:var(--teal);}
.progress-bar{background:var(--gray-l);border-radius:4px;height:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;}
input,select,textarea{font-family:var(--sans);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.loadbar{height:3px;background:var(--teal-l);border-radius:2px;overflow:hidden;position:relative;margin-bottom:14px;}
.loadbar::after{content:'';position:absolute;inset:0;background:var(--teal);animation:loadbar 1.1s ease infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .25s ease both;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#06302a 0%,#0F6E56 55%,#1D9E75 100%);}
.login-box{background:#fff;border-radius:20px;padding:44px 40px;width:380px;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.login-brand{text-align:center;margin-bottom:32px;}
.login-brand .school{font-size:11px;color:var(--gray-m);letter-spacing:.1em;text-transform:uppercase;}
.login-brand .name{font-family:var(--serif);font-size:26px;color:var(--teal);margin-top:4px;}
.login-brand .sub{font-size:12px;color:var(--gray-m);margin-top:2px;}
.pin-label{font-size:12px;font-weight:600;color:var(--gray);margin-bottom:6px;}
.pin-input{width:100%;border:2px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:22px;letter-spacing:.4em;text-align:center;font-weight:600;font-family:var(--mono);transition:border .2s;outline:none;}
.pin-input:focus{border-color:var(--teal);}
.pin-hint{font-size:11px;color:var(--gray-m);margin-top:6px;text-align:center;line-height:1.5;}
.pin-error{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px;}
.login-codes{margin-top:20px;background:var(--gray-ll);border-radius:var(--rs);padding:12px 14px;}
.login-codes .title{font-size:10px;font-weight:600;color:var(--gray-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.code-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.code-val{font-family:var(--mono);font-weight:500;color:var(--teal);}

/* ── APP SHELL ── */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{background:var(--teal-d);color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:200;}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-logo{font-family:var(--serif);font-size:17px;}
.topbar-sep{width:1px;height:18px;background:rgba(255,255,255,.2);}
.topbar-page{font-size:12px;opacity:.7;font-weight:300;}
.app-body{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:200px;background:var(--teal-d);color:#fff;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-info{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.12);}
.sidebar-info .role{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.06em;}
.sidebar-info .name{font-size:13px;font-weight:500;margin-top:2px;}
.sidebar-info .klass{font-size:11px;opacity:.5;margin-top:1px;}
.sidebar-nav{padding:8px 6px;flex:1;overflow-y:auto;}
.nav-sec{font-size:9px;opacity:.45;letter-spacing:.08em;text-transform:uppercase;padding:8px 8px 3px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:12px;transition:background .15s;margin-bottom:1px;color:rgba(255,255,255,.8);}
.nav-item:hover{background:rgba(255,255,255,.1);}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:500;}
.nav-item .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--coral);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.main-title{font-family:var(--serif);font-size:18px;}
.main-sub{font-size:11px;color:var(--gray-m);margin-top:1px;}
.main-content{flex:1;overflow-y:auto;padding:22px;}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.stat-val{font-size:26px;font-weight:700;font-family:var(--serif);}
.stat-label{font-size:11px;color:var(--gray-m);margin-top:1px;}

/* ── TABLES ── */
.ms-table{width:100%;border-collapse:collapse;font-size:12px;}
.ms-table th{background:var(--gray-l);padding:7px 11px;text-align:left;font-size:10px;font-weight:600;color:var(--gray-m);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);}
.ms-table td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ms-table tr:last-child td{border-bottom:none;}
.ms-table tr:hover td{background:var(--gray-ll);}

/* ── HEATMAP ── */
.hm-cell{border-radius:3px;height:16px;cursor:pointer;transition:opacity .15s;}
.hm-cell:hover{opacity:.7;}

/* ── STUDENT CARDS ── */
.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .15s;}
.sc-card:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(15,110,86,.1);transform:translateY(-1px);}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:8px 16px;cursor:pointer;font-size:13px;color:var(--gray-m);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab:hover{color:var(--gray);}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500;}

/* ── GENERATOR ── */
.gen-layout{display:grid;grid-template-columns:340px 1fr;gap:0;height:100%;overflow:hidden;}
.gen-panel{border-right:1px solid var(--border);overflow-y:auto;padding:20px 18px;background:var(--surface);}
.gen-preview{overflow-y:auto;padding:20px;}
.gen-section{margin-bottom:22px;}
.gen-section-title{font-size:11px;font-weight:600;color:var(--teal-d);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--gray-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.inp,.sel,.ta{width:100%;border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 11px;font-size:13px;font-family:var(--sans);color:var(--gray);background:#fff;transition:border .15s;outline:none;}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--teal);}
.ta{resize:vertical;min-height:60px;line-height:1.5;}
.toggle-row{display:grid;gap:4px;}
.toggle-row.cols-2{grid-template-columns:1fr 1fr;}
.toggle-row.cols-3{grid-template-columns:1fr 1fr 1fr;}
.toggle-row.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}
.tog-btn{padding:7px 4px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;text-align:center;background:#fff;color:var(--gray-m);transition:all .15s;font-family:var(--sans);}
.tog-btn.on{border-color:var(--teal);background:var(--teal-l);color:var(--teal);}
.s-chip{display:flex;align-items:center;gap:5px;padding:3px 9px 3px 5px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--gray-m);transition:all .15s;user-select:none;}
.s-chip .av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;}
.s-chip.on{border-color:var(--teal);background:var(--teal-l);color:var(--teal);}
.ms-chip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--gray-m);transition:all .15s;user-select:none;font-family:var(--mono);}
.ms-chip.on{border-color:var(--purple);background:var(--purple-l);color:var(--purple);}
.big-btn{width:100%;padding:13px;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.big-btn.teal{background:var(--teal);color:#fff;} .big-btn.teal:hover{background:var(--teal-m);transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,110,86,.3);}
.big-btn.ghost{background:#fff;color:var(--gray);border:1.5px solid var(--border);} .big-btn.ghost:hover{border-color:var(--teal);color:var(--teal);}
.big-btn.disabled{background:var(--gray-l);color:var(--gray-m);cursor:not-allowed;}

/* ── WORKSHEET ── */
.ws{background:#fff;border-radius:var(--r);box-shadow:0 2px 12px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);margin-bottom:16px;overflow:hidden;}
.ws-inner{padding:28px 32px;}
.ws-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;padding-bottom:14px;border-bottom:2.5px solid var(--teal-d);}
.ws-school{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:2px;}
.ws-title{font-family:var(--serif);font-size:20px;color:var(--gray);}
.ws-name{font-family:var(--serif);font-size:15px;text-align:right;}
.ws-date{font-size:10px;color:var(--gray-m);text-align:right;margin-top:2px;}
.ws-infobar{display:flex;gap:14px;margin-bottom:16px;padding:8px 12px;background:var(--gray-ll);border-radius:var(--rs);font-size:10px;color:var(--gray-m);}
.task-item{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.task-item:last-child{border:none;margin:0;padding:0;}
.task-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.task-num{width:24px;height:24px;border-radius:50%;background:var(--teal-d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.task-ctx{font-size:11px;color:var(--gray-m);font-style:italic;margin-bottom:3px;}
.task-q{font-size:13px;font-weight:500;line-height:1.6;}
.task-space{margin-top:8px;border:1px dashed var(--border);border-radius:6px;background:var(--gray-ll);}
.task-ms{font-size:9px;font-family:var(--mono);color:var(--gray-m);background:var(--gray-l);padding:1px 5px;border-radius:3px;margin-left:auto;flex-shrink:0;}
.ws-footer-bar{display:flex;gap:8px;padding:10px 14px;background:var(--gray-ll);border-top:1px solid var(--border);}
.ws-foot{display:flex;justify-content:space-between;font-size:9px;color:var(--gray-m);margin-top:14px;padding-top:10px;border-top:1px solid var(--border);}

/* ── UPLOAD ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:32px;text-align:center;transition:all .2s;cursor:pointer;background:#fff;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--teal);background:var(--teal-l);}
.upload-zone.drag{transform:scale(1.01);}
.upload-icon{font-size:36px;margin-bottom:10px;}
.upload-title{font-family:var(--serif);font-size:18px;margin-bottom:4px;}
.upload-sub{font-size:12px;color:var(--gray-m);}

/* ── RESULT CARDS ── */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.result-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.result-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.result-body{padding:14px 16px;}
.ms-result-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.ms-result-row:last-child{border:none;}
.ms-status-before{width:80px;text-align:right;}
.ms-arrow{color:var(--gray-m);font-size:14px;}
.ms-status-after{width:80px;}

/* ── STUDENT SHELL ── */
.student-hero{background:linear-gradient(135deg,var(--teal-d),var(--teal-m));color:#fff;padding:24px;}
.student-body{padding:20px;max-width:640px;margin:0 auto;}
.xp-wrap{background:rgba(255,255,255,.2);border-radius:8px;height:8px;margin-top:10px;overflow:hidden;}
.xp-fill{height:100%;background:#fff;border-radius:8px;transition:width .6s;}
.ms-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;margin-bottom:8px;}
.ms-card:hover{border-color:var(--teal);transform:translateY(-1px);}
.ms-card.locked{opacity:.4;cursor:not-allowed;}
.ms-card.locked:hover{transform:none;border-color:var(--border);}
.ms-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}

/* ── TASK BOX ── */
.task-box{background:var(--purple-l);border:1px solid #AFA9EC;border-radius:var(--r);padding:20px;}
.task-prompt{font-size:15px;font-weight:500;color:var(--purple);line-height:1.6;margin:8px 0 14px;}
.task-ctx-s{font-size:12px;color:var(--gray-m);font-style:italic;margin-bottom:6px;}
.task-inp{width:100%;border:1.5px solid #AFA9EC;border-radius:var(--rs);padding:9px 12px;font-size:14px;background:#fff;resize:vertical;min-height:52px;font-family:var(--sans);outline:none;}
.task-inp:focus{border-color:var(--purple);}
.ai-fb{background:#fff;border:1px solid #AFA9EC;border-radius:var(--rs);padding:12px 14px;margin-top:10px;font-size:13px;line-height:1.6;}
.ai-fb-label{font-size:10px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}

@media print{
  .sidebar,.topbar,.main-header,.ws-footer-bar,#gen-panel{display:none!important;}
  .gen-layout{display:block;}
  .gen-preview{padding:0;}
  .ws{box-shadow:none;border-radius:0;page-break-after:always;}
}
</style>
</head>
<body>

<!-- ═══════ LOGIN ═══════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">
      <div class="school">SIS Swiss International School</div>
      <div class="name">AI Learning</div>
      <div class="sub">Mathematik Klasse 5b</div>
    </div>
    <div class="pin-label">Zugangscode</div>
    <input class="pin-input" id="pin-inp" type="password" maxlength="4" placeholder="••••"
      oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="pin-hint">Schüler: persönlicher 4-stelliger Code<br>Lehrperson: <strong>9999</strong></div>
    <div class="pin-error" id="pin-err"></div>
    <button class="btn btn-teal" style="width:100%;justify-content:center;margin-top:14px;padding:12px;" onclick="doLogin()">Einloggen →</button>
    <div class="login-codes">
      <div class="title">Demo-Codes</div>
      <div class="code-row"><span>Lehrperson</span><span class="code-val">9999</span></div>
      <div class="code-row"><span>Noah Fischer (EN, Lücke)</span><span class="code-val">1002</span></div>
      <div class="code-row"><span>Sofia Chen (Vertiefung)</span><span class="code-val">1003</span></div>
      <div class="code-row"><span>Max Brunner (Förderung)</span><span class="code-val">1004</span></div>
    </div>
  </div>
</div>

<!-- ═══════ APP ═══════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">SIS AI Learning</div>
      <div class="topbar-sep"></div>
      <div class="topbar-page" id="tb-page">Dashboard</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="tb-user" style="font-size:12px;opacity:.7;"></span>
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2);" onclick="logout()">Ausloggen</button>
    </div>
  </div>
  <div class="app-body" id="app-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
const MS = [
  {id:"MS1.1",unit:"Zahl",title:"Grosse Zahlen",en:"Large Numbers",bloom:"Verstehen",niv:1,pre:[]},
  {id:"MS1.2",unit:"Zahl",title:"Runden & Schätzen",en:"Rounding",bloom:"Anwenden",niv:1,pre:["MS1.1"]},
  {id:"MS2.1",unit:"Zahl",title:"Addition & Subtraktion",en:"Addition & Subtraction",bloom:"Anwenden",niv:1,pre:["MS1.1"]},
  {id:"MS2.2",unit:"Zahl",title:"Multiplikation",en:"Multiplication",bloom:"Anwenden",niv:1,pre:["MS2.1"]},
  {id:"MS2.3",unit:"Zahl",title:"Division",en:"Division",bloom:"Anwenden",niv:1,pre:["MS2.2"]},

// HELPERS

const mk = id => id.replace('.','_');
function getSt(s,id){return(s.ms[mk(id)]||0);}
function pct(s){const d=MS.filter(m=>getSt(s,m.id)>=2).length;return Math.round(d/MS.length*100);}
function lvl(xp){return Math.floor(xp/100)+1;}
function xpIn(xp){return xp%100;}
function stLabel(v){return v===3?'★★★':v===2?'✓ Erreicht':v===1?'⟳ In Arbeit':v===-1?'⚠ Lücke':'—';}
function stPill(v){
  if(v===3)return`<span class="pill pill-purple">★★★</span>`;
  if(v===2)return`<span class="pill pill-green">✓</span>`;
  if(v===1)return`<span class="pill pill-amber">⟳</span>`;
  if(v===-1)return`<span class="pill pill-red">⚠ Lücke</span>`;
  return`<span class="pill pill-gray">—</span>`;
}
function getAlerts(s){
  const a=[];
  MS.forEach(m=>{
    const st=getSt(s,m.id);
    if(st===-1)a.push({type:'red',text:`Lücke: ${m.id} (${m.title})`});
    (m.pre||[]).forEach(p=>{if(st>0&&getSt(s,p)<2)a.push({type:'amber',text:`${m.id} begonnen, Prereq ${p} fehlt`});});
  });
  return a;
}
function getSD(s){
  const saved=JSON.parse(localStorage.getItem('sis_'+s.id)||'{}');
  return{...s,ms:{...s.ms,...(saved.ms||{})},xp:saved.xp??s.xp};
}
function saveSD(s,patch){
  const cur=JSON.parse(localStorage.getItem('sis_'+s.id)||'{}');
  localStorage.setItem('sis_'+s.id,JSON.stringify({...cur,...patch}));
}
function allSD(){return STUDENTS.map(s=>getSD(s));}
function bloomColor(b){return{Verstehen:'#0F6E56',Anwenden:'#534AB7',Analysieren:'#854F0B',Erinnern:'#73726C',Evaluieren:'#993C1D',Kreieren:'#A32D2D'}[b]||'#73726C';}

let CU=null; // current user

function doLogin(){
  const pin=document.getElementById('pin-inp').value.trim();
  document.getElementById('pin-err').textContent='';
  if(pin==='9999'){CU={role:'teacher'};launch();return;}
  const s=STUDENTS.find(x=>x.pin===pin);
  if(s){CU={role:'student',student:getSD(s)};launch();return;}
  document.getElementById('pin-err').textContent='Ungültiger Code.';
  document.getElementById('pin-inp').value='';
  document.getElementById('pin-inp').focus();
}
function logout(){
  CU=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pin-inp').value='';
}
function launch(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  if(CU.role==='teacher'){
    document.getElementById('tb-user').textContent='Lehrperson · Klasse 5b';
    buildTeacher();
  } else {
    document.getElementById('tb-user').textContent=CU.student.name;
    buildStudent();
  }
}

            const p=Math.round(done/ums.length*100);
            return`<div style="margin-bottom:10px;">
              <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span>${u}</span><span style="color:var(--gray-m)">${done}/${ums.length}</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:var(--teal)"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  } else {
    body.innerHTML=`<div class="card">
      <table class="ms-table"><thead><tr><th>Milestone</th><th>Status</th><th>Übungs-Stand</th><th>Prereq.</th></tr></thead>
      <tbody>${MS.map(m=>{
        const st=getSt(s,m.id);
        const pok=(m.pre||[]).every(p=>getSt(s,p)>=2);
        const uebung=st===1?'Aktiv geübt':st>=2?'Validiert':'—';
        return`<tr><td><div style="font-size:12px;font-weight:500;">${m.id}</div><div style="font-size:10px;color:var(--gray-m);">${m.title}</div></td>
        <td>${stPill(st)}</td>
        <td style="font-size:11px;color:var(--gray-m);">${uebung}</td>
        <td style="font-size:11px;">${!(m.pre||[]).length?'—':pok?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--red)">⚠</span>'}</td></tr>`;
      }).join('')}</tbody></table></div>`;
  }
}

async function gGenerate(){

async function gGenSheet(student,msList,anzahl,ctx,datum){
  const isEN=student?student.lang==='EN':GS.lang==='EN';
  const isBi=student?student.lang==='bilingual':GS.lang==='bilingual';
  const langLabel=isBi?'bilingual (German and English mixed naturally)':isEN?'English':'Deutsch';
  let niveauNote=`Niveau: ${'★'.repeat(typeof GS.niveau==='number'?GS.niveau:2)} ${GS.niveau==='mix'?'(mixed levels)':''}`;
  if(student){
    const gaps=msList.filter(m=>getSt(student,m.id)===-1);
    if(gaps.length>0)niveauNote=`REMEDIAL: gaps in ${gaps.map(m=>m.id).join(',')}. Rebuild from scratch.`;
    else if(msList.every(m=>getSt(student,m.id)>=2))niveauNote=`ADVANCED: push to ★★★.`;
  }
  const prompt=`You are an expert primary school math teacher at SIS Swiss International School (bilingual, LP21, grade 5/6).
Create EXACTLY ${anzahl} math tasks for a worksheet.
${student?`Student: ${student.name} (${student.lang})`:'CLASS worksheet.'}
Language: ${langLabel}
Milestones: ${msList.map(m=>`${m.id} "${m.title}" (Bloom: ${m.bloom})`).join(', ')}
${niveauNote}
${ctx?`Theme: "${ctx}"`:'Use varied age-appropriate real-world contexts.'}
Respond ONLY with JSON (no markdown):
{"tasks":[{"milestone_id":"MS3.4","context":"1-sentence scenario","question":"the question","solution":"answer","bloom":"Anwenden","niveau":1}]}`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  const raw=d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
  return{student,tasks:JSON.parse(raw).tasks,datum};
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if(file)handleFile(file);
}

function handleFile(file){
  if(!file)return;
  uploadState.file=file;
  const reader=new FileReader();
  reader.onload=e=>{
    uploadState.preview=e.target.result;

function applyUpdates(updates, studentId){
  if(!studentId)return;
  const s=STUDENTS.find(x=>x.id===studentId);
  if(!s)return;
  const saved=JSON.parse(localStorage.getItem('sis_'+studentId)||'{}');
  const ms=saved.ms||{};
  updates.forEach(u=>{ms[mk(u.milestone_id)]=u.suggested_status;});
  saved.ms=ms;
  localStorage.setItem('sis_'+studentId,JSON.stringify(saved));
  const panel=document.getElementById('analysis-panel');
  panel.innerHTML+=`<div class="alert alert-green fade-up" style="margin-top:12px;">✓ ${updates.length} Milestone-Updates gespeichert für ${s.name}. <a href="#" onclick="tNavSt('${studentId}')" style="color:var(--green);font-weight:500;">Profil ansehen →</a></div>`;
}

function setMRes(msId,val){
  mResults[msId]=val;
  ['na','ok','no'].forEach(v=>document.getElementById(`mres-${msId}-${v}`).classList.toggle('on',v===val));
}

function saveManuell(){
  const sid=document.getElementById('m-student').value;
  const note=document.getElementById('m-note').value;
  const updates=[];
  Object.entries(mResults).forEach(([msId,val])=>{
    if(val==='ok')updates.push({milestone_id:msId,suggested_status:1,reason:`Aufgabe korrekt (Note: ${note})`});
    if(val==='no')updates.push({milestone_id:msId,suggested_status:-1,reason:`Aufgabe falsch (Note: ${note})`});

  if(!updates.length){alert('Bitte mindestens eine Aufgabe auswerten.');return;}
  applyUpdates(updates,sid);

function sTab(tab){

function renderSUeben(){
  const s=CU.student;
  const isEN=s.lang==='EN';
  if(activeTaskMs){document.getElementById('s-content').innerHTML=renderTaskBox();generateSTask(activeTaskMs);return;}
  const gaps=MS.filter(m=>getSt(s,m.id)===-1);
  const inProg=MS.filter(m=>getSt(s,m.id)===1);
  const unlocked=MS.filter(m=>{const st=getSt(s,m.id);return st===0&&(m.pre||[]).every(p=>getSt(s,p)>=2);});
  const done=MS.filter(m=>getSt(s,m.id)>=2);
  const locked=MS.filter(m=>{const st=getSt(s,m.id);return st===0&&(m.pre||[]).some(p=>getSt(s,p)<2);});
  const sections=[
    {label:isEN?'⚠ Fill gaps':'⚠ Lücken',items:gaps,color:'var(--red)',icon:'⚠'},
    {label:isEN?'▶ In progress':'▶ In Arbeit',items:inProg,color:'var(--amber)',icon:'⟳'},
    {label:isEN?'🔓 Ready':'🔓 Bereit',items:unlocked,color:'var(--teal)',icon:'▶'},
    {label:isEN?'✓ Done':'✓ Erledigt',items:done,color:'var(--green)',icon:'✓'},
    {label:isEN?'🔒 Locked':'🔒 Gesperrt',items:locked,color:'var(--gray-m)',icon:'🔒'},
  ].filter(sec=>sec.items.length);
  document.getElementById('s-content').innerHTML=sections.map(sec=>`
    <div style="margin-bottom:18px;">
      <div style="font-size:10px;font-weight:600;color:${sec.color};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">${sec.label}</div>
      ${sec.items.map(m=>{
        const st=getSt(s,m.id);const isLocked=sec.icon==='🔒';const isDone=st>=2;
        return`<div class="ms-card ${isLocked?'locked':''}" onclick="${isLocked?'':isDone?`startSTask('${m.id}')`:`startSTask('${m.id}')`}">
          <div class="ms-icon" style="background:${isDone?'var(--green-l)':isLocked?'var(--gray-l)':'var(--purple-l)'};">${isDone?'✓':isLocked?'🔒':sec.icon}</div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${isEN?m.en:m.title}</div>
          <div style="font-size:10px;color:var(--gray-m);">${m.id} · ${m.niv===2?'★★':m.niv===3?'★★★':'★'}</div>
          ${st===-1?`<span class="pill pill-red" style="margin-top:3px;font-size:10px;">Lücke</span>`:st===1?`<span class="pill pill-amber" style="margin-top:3px;font-size:10px;">In Arbeit</span>`:''}</div>
          ${!isLocked?`<span style="font-size:12px;color:var(--teal);">${isEN?'Practice →':'Üben →'}</span>`:''}
        </div>`;
      }).join('')}
    </div>`).join('');
}

async function generateSTask(msId){
  const ms=MS.find(m=>m.id===msId);const s=CU.student;const isEN=s.lang==='EN';
  const st=getSt(s,msId);
  const prompt=`You are a friendly math teacher for grade 5/6 at SIS Swiss International School.
Create ONE engaging math task for: ${s.name} (${s.lang})
Milestone: ${msId} "${ms.title}" (Bloom: ${ms.bloom})
${st===-1?'REMEDIAL: student has a gap. Be extra supportive and start from basics.':st===2||st===3?'ADVANCED: student mastered this. Challenge them!':'Standard level.'}
Language: ${isEN?'English':'Deutsch (or bilingual if student is bilingual)'}
Use a fun real-world context. Keep it age-appropriate for 10-12 year olds.
Respond ONLY with JSON: {"context":"1-sentence scenario","question":"the question","hint":"gentle 1-sentence hint","solution":"the answer","steps":["step1","step2"],"xp":${st===-1?20:15}}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    const raw=d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    showSTask(JSON.parse(raw),ms);
  }catch(e){
    showSTask({context:isEN?"It's pizza day at school!":"Heute gibt es Pizza zum Mittagessen.",question:isEN?"Max eats 2/8 and Sara eats 3/8 of the pizza. How much in total?":"Max isst 2/8, Sara isst 3/8 der Pizza. Wie viel zusammen?",hint:isEN?"Same denominator — just add the top numbers!":"Gleicher Nenner — addiere nur die Zähler!",solution:"5/8",steps:isEN?["Same denominator: 8","2+3=5","Answer: 5/8"]:["Gleicher Nenner: 8","2+3=5","Ergebnis: 5/8"],xp:15},ms);
  }
}

async function checkSAns(taskJson){
  const task=JSON.parse(taskJson);const ans=document.getElementById('s-ans').value.trim();
  const s=CU.student;const isEN=s.lang==='EN';
  if(!ans){alert(isEN?'Please write an answer.':'Bitte Antwort eingeben.');return;}
  const fb=document.getElementById('s-fb');fb.innerHTML=`<div class="loadbar" style="margin-top:8px;"></div>`;
  const prompt=`Warm encouraging math feedback for grade 5/6 student ${s.name.split(' ')[0]}.
Task: ${task.question} | Correct: ${task.solution} | Student wrote: ${ans}
Language: ${isEN?'English':'Deutsch'}
1-2 sentences, encouraging even if wrong. Respond ONLY with JSON: {"correct":true/false,"feedback":"..."}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    const raw=d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const res=JSON.parse(raw);showSFb(res.correct,res.feedback,task.xp);
  }catch(e){
    const ok=ans.replace(/\s/g,'')==task.solution.replace(/\s/g,'');
    showSFb(ok,ok?(isEN?`Great job! That's exactly right.`:`Super! Das ist genau richtig.`):(isEN?`Not quite — check the hint!`:`Noch nicht ganz — schau nochmal auf den Tipp!`),task.xp);
  }
}

function showSFb(correct,feedback,xp){
  const isEN=CU.student.lang==='EN';
  document.getElementById('s-fb').innerHTML=`<div class="ai-fb fade-up" style="margin-top:10px;">
    <div class="ai-fb-label">✦ Feedback</div>
    <div style="font-size:15px;margin-bottom:5px;color:${correct?'var(--green)':'var(--coral)'};">${correct?'🎉 '+(isEN?'Correct!':'Richtig!'):'🤔 '+(isEN?'Almost!':'Fast!')}</div>
    <div>${feedback}</div>
    ${correct?`<div class="alert alert-green" style="margin-top:8px;">+${xp} XP! <button class="btn btn-teal btn-sm" style="margin-left:8px;" onclick="awardXP(${xp})">${isEN?'Collect':'Einlösen'}</button></div>`:''}
  </div>`;
}

function awardXP(amount){
  const s=CU.student;s.xp+=amount;
  const saved=JSON.parse(localStorage.getItem('sis_'+s.id)||'{}');
  saved.xp=s.xp;localStorage.setItem('sis_'+s.id,JSON.stringify(saved));
  activeTaskMs=null;
  setTimeout(()=>{buildStudent();},900);
}

function renderSFort(){
  const s=CU.student;const isEN=s.lang==='EN';
  const units=[...new Set(MS.map(m=>m.unit))];
  document.getElementById('s-content').innerHTML=`
    <div class="g2" style="margin-bottom:16px;">
      <div class="card"><div style="font-size:28px;font-weight:700;color:var(--teal);font-family:var(--serif);">${pct(s)}%</div>
        <div style="font-size:12px;color:var(--gray-m);">${isEN?'Overall progress':'Gesamtfortschritt'}</div>
        <div class="progress-bar" style="margin-top:8px;height:8px;"><div class="progress-fill" style="width:${pct(s)}%;background:var(--teal)"></div></div></div>
      <div class="card"><div style="font-size:28px;font-weight:700;color:var(--purple);font-family:var(--serif);">Lvl ${lvl(s.xp)}</div>
        <div style="font-size:12px;color:var(--gray-m);">${s.xp} XP · ${100-xpIn(s.xp)} ${isEN?'to next':'zum nächsten'}</div>
        <div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:${xpIn(s.xp)}%;background:var(--purple)"></div></div></div>
    </div>
    ${units.map(u=>{const ms=MS.filter(m=>m.unit===u);const d=ms.filter(m=>getSt(s,m.id)>=2).length;const p=Math.round(d/ms.length*100);
      return`<div class="card" style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="font-weight:500;">${u}</span><span style="font-size:12px;color:var(--gray-m);">${d}/${ms.length}</span></div>
        <div class="progress-bar" style="margin-bottom:8px;"><div class="progress-fill" style="width:${p}%;background:var(--teal)"></div></div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">${ms.map(m=>{const st=getSt(s,m.id);
          return`<span style="font-size:10px;padding:2px 7px;border-radius:12px;background:${st>=2?'var(--green-l)':st===1?'var(--amber-l)':st===-1?'var(--red-l)':'var(--gray-l)'};color:${st>=2?'var(--green)':st===1?'var(--amber)':st===-1?'var(--red)':'var(--gray-m)'};">${m.id}</span>`;}).join('')}</div>
      </div>`;}).join('')}`;
}

function renderSAbz(){
  const s=CU.student;const isEN=s.lang==='EN';
  const done=MS.filter(m=>getSt(s,m.id)>=2).length;
  const badges=[
    {icon:'🌱',label:isEN?'First step':'Erster Schritt',desc:isEN?'First milestone done':'Ersten Milestone erreicht',earned:done>=1,cls:'pill-green'},
    {icon:'⚡',label:isEN?'Halfway':'Halbzeit',desc:isEN?'50% done':'50% geschafft',earned:pct(s)>=50,cls:'pill-amber'},
    {icon:'🏆',label:isEN?'Champion':'Champion',desc:isEN?'All done':'Alle erreicht',earned:pct(s)>=100,cls:'pill-purple'},
    {icon:'⭐',label:isEN?'Advanced':'Vertiefung',desc:isEN?'★★★ achieved':'★★★ Niveau erreicht',earned:MS.some(m=>getSt(s,m.id)===3),cls:'pill-purple'},
    {icon:'🔥',label:isEN?'On fire!':'Am Laufen!',desc:isEN?'200+ XP':'200+ XP verdient',earned:s.xp>=200,cls:'pill-coral'},
    {icon:'🌐',label:isEN?'Bilingual':'Zweisprachig',desc:isEN?'Bilingual learner':'Bilingual gelernt',earned:s.lang==='bilingual',cls:'pill-teal'},
  ];
  document.getElementById('s-content').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;">
      ${badges.map(b=>`<div class="card" style="text-align:center;opacity:${b.earned?1:.35};">
        <div style="font-size:32px;margin-bottom:8px;">${b.icon}</div>
        <span class="pill ${b.cls}" style="margin-bottom:6px;">${b.label}</span>
        <div style="font-size:11px;color:var(--gray-m);margin-top:6px;">${b.desc}</div>
        ${b.earned?`<div style="font-size:10px;color:var(--green);margin-top:8px;font-weight:500;">✓ ${isEN?'Earned':'Erhalten'}</div>`:''}
      </div>`).join('')}
    </div>`;
}

// Init
document.getElementById('pin-inp').focus();
</script>
</body>
</html>
