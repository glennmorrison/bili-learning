<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bili Learning</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--teal:#0F6E56;--teal-m:#1D9E75;--teal-l:#E1F5EE;--teal-d:#085041;--purple:#534AB7;--purple-l:#EEEDFE;--coral:#993C1D;--coral-l:#FAECE7;--amber:#854F0B;--amber-l:#FAEEDA;--gray:#2C2C2A;--gray-m:#73726C;--gray-l:#F1EFE8;--gray-ll:#F8F7F2;--green:#3B6D11;--green-l:#EAF3DE;--red:#A32D2D;--red-l:#FCEBEB;--border:#E0DED6;--surface:#fff;--r:12px;--rs:8px;--serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--gray-ll);color:var(--gray);font-size:14px;line-height:1.5;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--sans);}
.btn-teal{background:var(--teal);color:#fff;}.btn-teal:hover{background:var(--teal-m);}
.btn-purple{background:var(--purple);color:#fff;}.btn-purple:hover{opacity:.9;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);}.btn-ghost:hover{border-color:var(--teal);color:var(--teal);}
.btn-sm{padding:5px 12px;font-size:12px;}.btn:disabled{opacity:.45;cursor:not-allowed;}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.pill-teal{background:var(--teal-l);color:var(--teal);}.pill-purple{background:var(--purple-l);color:var(--purple);}.pill-green{background:var(--green-l);color:var(--green);}.pill-amber{background:var(--amber-l);color:var(--amber);}.pill-coral{background:var(--coral-l);color:var(--coral);}.pill-gray{background:var(--gray-l);color:var(--gray-m);}.pill-red{background:var(--red-l);color:var(--red);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.card-title{font-size:11px;font-weight:600;color:var(--gray-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
.alert{border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:8px;border-left:3px solid;}
.alert-red{background:var(--red-l);color:var(--red);border-color:var(--red);}
.alert-amber{background:var(--amber-l);color:var(--amber);border-color:var(--amber);}
.alert-green{background:var(--green-l);color:var(--green);border-color:var(--green);}
.alert-teal{background:var(--teal-l);color:var(--teal);border-color:var(--teal);}
.progress-bar{background:var(--gray-l);border-radius:4px;height:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.loadbar{height:3px;background:var(--teal-l);border-radius:2px;overflow:hidden;position:relative;margin-bottom:14px;}
.loadbar::after{content:'';position:absolute;inset:0;background:var(--teal);animation:loadbar 1.1s ease infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .25s ease both;}
input,select,textarea{font-family:var(--sans);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--gray-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.inp,.sel{width:100%;border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-size:13px;color:var(--gray);background:#fff;transition:border .15s;outline:none;}
.inp:focus,.sel:focus{border-color:var(--teal);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.stat-val{font-size:26px;font-weight:700;font-family:var(--serif);}
.stat-label{font-size:11px;color:var(--gray-m);margin-top:1px;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:var(--gray-l);padding:7px 11px;text-align:left;font-size:10px;font-weight:600;color:var(--gray-m);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}.tbl tr:hover td{background:var(--gray-ll);}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;}
.tab{padding:8px 15px;cursor:pointer;font-size:13px;color:var(--gray-m);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab:hover{color:var(--gray);}.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500;}
.ms-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;margin-bottom:8px;}
.ms-card:hover{border-color:var(--teal);transform:translateY(-1px);}
.ms-card.locked{opacity:.4;cursor:not-allowed;}.ms-card.locked:hover{transform:none;border-color:var(--border);}
.task-box{background:var(--purple-l);border:1px solid #AFA9EC;border-radius:var(--r);padding:20px;}
.task-prompt{font-size:15px;font-weight:500;color:var(--purple);line-height:1.6;margin:8px 0 14px;}
.task-inp{width:100%;border:1.5px solid #AFA9EC;border-radius:var(--rs);padding:9px 12px;font-size:14px;background:#fff;resize:vertical;min-height:52px;font-family:var(--sans);outline:none;}
.task-inp:focus{border-color:var(--purple);}
.ai-fb{background:#fff;border:1px solid #AFA9EC;border-radius:var(--rs);padding:12px 14px;margin-top:10px;font-size:13px;line-height:1.6;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#06302a 0%,#0F6E56 55%,#1D9E75 100%);}
.login-box{background:#fff;border-radius:20px;padding:44px 40px;width:400px;max-width:95vw;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.login-brand{text-align:center;margin-bottom:28px;}
.login-brand .name{font-family:var(--serif);font-size:32px;color:var(--teal);}
.login-brand .sub{font-size:12px;color:var(--gray-m);margin-top:4px;}
.login-tabs{display:flex;gap:4px;background:var(--gray-l);padding:4px;border-radius:var(--rs);margin-bottom:20px;}
.login-tab{flex:1;padding:7px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;background:transparent;color:var(--gray-m);font-family:var(--sans);}
.login-tab.active{background:#fff;color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* APP */
#app{display:none;height:100vh;flex-direction:column;}
.topbar{background:var(--teal-d);color:#fff;height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-logo{font-family:var(--serif);font-size:17px;}
.app-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:200px;background:var(--teal-d);color:#fff;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-info{padding:14px;border-bottom:1px solid rgba(255,255,255,.12);}
.sidebar-info .role{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.06em;}
.sidebar-info .name{font-size:13px;font-weight:500;margin-top:2px;}
.sidebar-nav{padding:8px 6px;flex:1;overflow-y:auto;}
.nav-sec{font-size:9px;opacity:.45;letter-spacing:.08em;text-transform:uppercase;padding:8px 8px 3px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:rgba(255,255,255,.75);transition:background .15s;margin-bottom:1px;}
.nav-item:hover{background:rgba(255,255,255,.1);}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:500;}
.nav-item .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.main-title{font-family:var(--serif);font-size:18px;}
.main-sub{font-size:11px;color:var(--gray-m);margin-top:1px;}
.main-content{flex:1;overflow-y:auto;padding:22px;}
.student-hero{background:linear-gradient(135deg,var(--teal-d),var(--teal-m));color:#fff;padding:24px;}
.xp-wrap{background:rgba(255,255,255,.2);border-radius:8px;height:8px;margin-top:10px;overflow:hidden;}
.xp-fill{height:100%;background:#fff;border-radius:8px;transition:width .6s;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:none;">
  <div class="login-box">
    <div class="login-brand">
      <div class="name">Bili</div>
      <div class="sub">Bilinguale KI-Lernplattform 🇨🇭</div>
    </div>
    <div id="lf-login">
      <div class="field"><label>E-Mail</label><input class="inp" type="email" id="l-email" placeholder="name@schule.ch" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="field"><label>Passwort</label><input class="inp" type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="l-err" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:8px;min-height:16px;"></div>
      <button class="btn btn-teal" style="width:100%;justify-content:center;padding:12px;" id="l-btn" onclick="doLogin()">Einloggen →</button>

    </div>
    </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="topbar-logo">Bili</div>
      <div style="width:1px;height:18px;background:rgba(255,255,255,.2);"></div>
      <div style="font-size:12px;opacity:.65;" id="tb-page">Dashboard</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="tb-user" style="font-size:12px;opacity:.7;"></span>
      <button class="btn-ghost btn btn-sm" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2);" onclick="doLogout()">Ausloggen</button>
    </div>
  </div>
  <div class="app-body" id="app-body"></div>
</div>

<script>
// ─── SUPABASE ───────────────────────────────────────────
const SB_URL = 'https://kcvfsmugfsfupzccynoi.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjdmZzbXVnZnNmdXB6Y2N5bm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkwNzgsImV4cCI6MjA4OTYxNTA3OH0.aUfTFVBpgYTCna57M6kUH7VgUMcfgyPKjRqpm6OvNs4';
const SB_FN = 'https://kcvfsmugfsfupzccynoi.supabase.co/functions/v1';

let sb = null;
function initSB() {
  if(SB_URL && SB_KEY) { sb = supabase.createClient(SB_URL, SB_KEY); return true; }
  return false;
}

// ─── MILESTONES ─────────────────────────────────────────
const MS=[
  {id:"MS1.1",unit:"Zahl",title:"Grosse Zahlen",en:"Large Numbers",bloom:"Verstehen",niv:1,pre:[]},
  {id:"MS1.2",unit:"Zahl",title:"Runden & Schätzen",en:"Rounding",bloom:"Anwenden",niv:1,pre:["MS1.1"]},
  {id:"MS2.1",unit:"Zahl",title:"Addition & Subtraktion",en:"Addition & Subtraction",bloom:"Anwenden",niv:1,pre:["MS1.1"]},
  {id:"MS2.2",unit:"Zahl",title:"Multiplikation",en:"Multiplication",bloom:"Anwenden",niv:1,pre:["MS2.1"]},
  {id:"MS2.3",unit:"Zahl",title:"Division",en:"Division",bloom:"Anwenden",niv:1,pre:["MS2.2"]},
  {id:"MS3.1",unit:"Brüche",title:"Bruchbegriff",en:"Fraction Concept",bloom:"Verstehen",niv:1,pre:[]},
  {id:"MS3.2",unit:"Brüche",title:"Brüche vergleichen",en:"Comparing Fractions",bloom:"Anwenden",niv:1,pre:["MS3.1"]},
  {id:"MS3.3",unit:"Brüche",title:"Kürzen & Erweitern",en:"Simplifying",bloom:"Anwenden",niv:1,pre:["MS3.2"]},
  {id:"MS3.4",unit:"Brüche",title:"Addition (gl. Nenner)",en:"Addition (like)",bloom:"Anwenden",niv:1,pre:["MS3.3"]},
  {id:"MS3.5",unit:"Brüche",title:"Addition (versch. N.)",en:"Addition (unlike)",bloom:"Analysieren",niv:2,pre:["MS3.4"]},
  {id:"MS4.1",unit:"Dezimal",title:"Dezimalzahlen",en:"Decimals",bloom:"Verstehen",niv:1,pre:["MS1.1"]},
  {id:"MS4.2",unit:"Dezimal",title:"Rechnen Dezimal",en:"Computing Decimals",bloom:"Anwenden",niv:1,pre:["MS4.1"]},
  {id:"MS6.1",unit:"Geo",title:"Umfang",en:"Perimeter",bloom:"Anwenden",niv:1,pre:[]},
  {id:"MS6.2",unit:"Geo",title:"Flächeninhalt",en:"Area",bloom:"Anwenden",niv:1,pre:["MS6.1"]},
  {id:"MS12.1",unit:"Daten",title:"Daten erheben",en:"Collecting Data",bloom:"Anwenden",niv:1,pre:[]},
  {id:"MS12.2",unit:"Daten",title:"Diagramme",en:"Diagrams",bloom:"Anwenden",niv:1,pre:["MS12.1"]},
];

// ─── STATE ──────────────────────────────────────────────
let CU = null;
let DEMO = false;

// ─── AUTH ───────────────────────────────────────────────

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  const btn=document.getElementById('l-btn');
  err.textContent='';
  btn.innerHTML='<div class="spinner"></div>';btn.disabled=true;
  if(!sb){err.textContent='Supabase nicht konfiguriert. Publishable Key eintragen.';btn.innerHTML='Einloggen →';btn.disabled=false;return;}
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Falsche E-Mail oder Passwort.';btn.innerHTML='Einloggen →';btn.disabled=false;return;}
  await loadProfile(data.user.id);
  launch();
}

async function doRegister(){
  const fn=document.getElementById('r-fn').value.trim();
  const ln=document.getElementById('r-ln').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  const rolle=document.getElementById('r-rolle').value;
  const lang=document.getElementById('r-lang').value;
  const err=document.getElementById('r-err');
  const btn=document.getElementById('r-btn');
  if(!fn||!ln||!email||!pass){err.textContent='Alle Felder ausfüllen.';return;}
  if(pass.length<8){err.textContent='Passwort mind. 8 Zeichen.';return;}
  btn.innerHTML='<div class="spinner"></div>';btn.disabled=true;
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){err.textContent=error.message;btn.innerHTML='Account erstellen →';btn.disabled=false;return;}
  await sb.from('profiles').insert({id:data.user.id,vorname:fn,nachname:ln,email,rolle,sprache:lang,aktiv:true,einwilligung:false});
  CU={id:data.user.id,vorname:fn,nachname:ln,email,rolle,sprache:lang};
  launch();
}

function demoLogin(){
  DEMO=true;
  CU={id:'demo',vorname:'Demo',nachname:'Lehrperson',email:'demo@bili.ch',rolle:'lehrperson',sprache:'DE'};
  launch();
}

async function loadProfile(uid){
  const {data}=await sb.from('profiles').select('*').eq('id',uid).single();
  if(data)CU=data;
}

async function doLogout(){
  if(!DEMO&&sb)await sb.auth.signOut();
  CU=null;DEMO=false;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function launch(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-user').textContent=(CU?.vorname||'')+(DEMO?' (Demo)':'');
  CU?.rolle==='schueler'?buildStudent():buildTeacher();
}

// ─── TEACHER ────────────────────────────────────────────
function buildTeacher(){
  document.getElementById('tb-page').textContent='Lehrperson';
  document.getElementById('app-body').innerHTML=`
    <div class="sidebar">
      <div class="sidebar-info">
        <div class="role">${CU?.rolle==='schulleitung'?'Schulleitung':CU?.rolle==='super_admin'?'Admin':'Lehrperson'}</div>
        <div class="name">${CU?.vorname} ${CU?.nachname}</div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-sec">Übersicht</div>
        <div class="nav-item active" id="tnav-dashboard" onclick="tNav('dashboard')"><span class="ic">📊</span>Dashboard</div>
        <div class="nav-item" id="tnav-schueler" onclick="tNav('schueler')"><span class="ic">👥</span>Schüler</div>
        <div class="nav-item" id="tnav-curriculum" onclick="tNav('curriculum')"><span class="ic">📚</span>Curriculum</div>
        <div class="nav-sec">Werkzeuge</div>
        <div class="nav-item" id="tnav-generator" onclick="tNav('generator')"><span class="ic">📄</span>Aufgabenblatt</div>
        <div class="nav-item" id="tnav-upload" onclick="tNav('upload')"><span class="ic">📤</span>Upload</div>
        <div class="nav-sec">System</div>
        <div class="nav-item" id="tnav-setup" onclick="tNav('setup')"><span class="ic">⚙️</span>Einstellungen</div>
      </div>
    </div>
    <div class="main">
      <div class="main-header">
        <div><div class="main-title" id="t-title">Dashboard</div>
        <div class="main-sub" id="t-sub">Bili · ${DEMO?'Demo-Modus':'Supabase 🇨🇭 Zürich'}</div></div>
        <div id="t-act"></div>
      </div>
      <div class="main-content" id="t-content"></div>
    </div>`;
  tNav('dashboard');
}

function tNav(v){
  document.querySelectorAll('.nav-item[id^="tnav-"]').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('tnav-'+v);if(el)el.classList.add('active');
  document.getElementById('t-title').textContent={dashboard:'Dashboard',schueler:'Schüler',curriculum:'Curriculum',generator:'Aufgabenblatt',upload:'Upload & Auswertung',setup:'Einstellungen'}[v]||v;
  document.getElementById('t-act').innerHTML='';
  ({dashboard:renderDash,schueler:renderSchueler,curriculum:renderCurr,generator:renderGen,upload:renderUpload,setup:renderSetup})[v]?.();
}

async function renderDash(){
  const c=document.getElementById('t-content');
  c.innerHTML='<div class="loadbar"></div>';
  let students=[];
  if(!DEMO&&sb){const{data}=await sb.from('profiles').select('*').eq('rolle','schueler');students=data||[];}
  c.innerHTML=`
    <div class="g4" style="margin-bottom:16px;">
      <div class="stat"><div class="stat-val" style="color:var(--teal)">${students.length}</div><div class="stat-label">Schülerinnen & Schüler</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--teal)">—</div><div class="stat-label">Ø Fortschritt</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--red)">—</div><div class="stat-label">Alerts</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--purple)">—</div><div class="stat-label">Vertiefung</div></div>
    </div>
    ${students.length===0?`
      <div class="alert alert-teal" style="margin-bottom:16px;">${DEMO?'Demo-Modus.':'✓ Supabase 🇨🇭 verbunden.'} Noch keine Schüler erfasst.
        <button class="btn btn-teal btn-sm" style="margin-left:8px;" onclick="tNav('setup')">Schüler anlegen →</button>
      </div>
      <div class="card">
        <div class="card-title">🚀 Erste Schritte</div>
        <div style="font-size:13px;line-height:2.2;">
          <div>1. <strong>Schüler anlegen</strong> → Einstellungen</div>
          <div>2. <strong>Schüler einloggen</strong> lassen (E-Mail + Passwort)</div>
          <div>3. <strong>Aufgabenblatt generieren</strong> → Generator</div>
          <div>4. <strong>Ergebnisse hochladen</strong> → Upload</div>
        </div>
      </div>`:
      `<div class="card">
        <div class="card-title">Schüler</div>
        <table class="tbl"><thead><tr><th>Name</th><th>E-Mail</th><th>Sprache</th><th>Status</th></tr></thead>
        <tbody>${students.map(s=>`<tr>
          <td style="font-weight:500;">${s.vorname} ${s.nachname}</td>
          <td style="color:var(--gray-m);font-size:12px;">${s.email}</td>
          <td><span class="pill pill-purple">${s.sprache||'DE'}</span></td>
          <td><span class="pill ${s.aktiv?'pill-green':'pill-amber'}">${s.aktiv?'Aktiv':'Ausstehend'}</span></td>
        </tr>`).join('')}</tbody></table>
      </div>`}`;
}

async function renderSchueler(){
  const c=document.getElementById('t-content');
  c.innerHTML='<div class="loadbar"></div>';

function handleUpl(f){if(!f)return;uploadFile=f;const r=new FileReader();r.onload=e=>{document.getElementById('upl-img').src=e.target.result;document.getElementById('upl-prev').style.display='block';};r.readAsDataURL(f);}

async function analyzeUpl(){
  const res=document.getElementById('anal-result');
  res.innerHTML='<div class="loadbar"></div><div style="text-align:center;padding:20px;color:var(--gray-m);">✦ Claude liest das Blatt…</div>';
  const r=new FileReader();
  r.onload=async e=>{
    const b64=e.target.result.split(',')[1];const mt=uploadFile.type||'image/jpeg';
    try{
      const resp=await fetch(SB_FN+'/anthropic-proxy',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(SB_KEY),'apikey':(SB_KEY)},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:`Analyze this math worksheet. For each task: milestone_id, student_answer, is_correct. Known milestones: ${MS.map(m=>m.id+':'+m.title).join(',')}. Respond ONLY JSON: {"student_name":"","tasks":[{"milestone_id":"","student_answer":"","is_correct":true,"notes":""}],"overall_impression":""}`}]}]})});

async function saveManuell(){
  const email=document.getElementById('m-email').value.trim();
  const note=document.getElementById('m-note').value;
  if(!email){alert('Bitte Schüler E-Mail eingeben.');return;}
  const updates=Object.entries(mRes).filter(([,v])=>v!=='na');
  if(!updates.length){alert('Mind. eine Aufgabe auswerten.');return;}
  const res=document.getElementById('m-res');
  if(!DEMO&&sb){
    const{data:p}=await sb.from('profiles').select('id').eq('email',email).single();
    if(!p){res.innerHTML='<div class="alert alert-red">Schüler nicht gefunden.</div>';return;}
    for(const[msId,v]of updates){
      await sb.from('schueler_milestones').upsert({schueler_id:p.id,milestone_id:msId,uebungs_status:v==='ok'?1:-1,updated_at:new Date().toISOString()});
    }
    res.innerHTML=`<div class="alert alert-green">${updates.length} Updates gespeichert. Note: ${note||'—'}</div>`;
  }else{res.innerHTML=`<div class="alert alert-amber">${updates.length} Updates (Demo-Modus).</div>`;}
}

  const res=document.getElementById('ns-res');
  if(!fn||!ln||!email||!pass){res.innerHTML='<div class="alert alert-red">Alle Felder ausfüllen.</div>';return;}
  if(pass.length<8){res.innerHTML='<div class="alert alert-red">Passwort mind. 8 Zeichen.</div>';return;}
  res.innerHTML='<div class="loadbar"></div>';
  if(!DEMO){
    try{
      const r=await fetch(SB_FN+'/create-user',{method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+(SB_KEY),'apikey':(SB_KEY)},
        body:JSON.stringify({vorname:fn,nachname:ln,email,password:pass,rolle:'schueler',sprache:lang})
      });
      const d=await r.json();
      if(d.error){res.innerHTML=`<div class="alert alert-red">${d.error}</div>`;return;}
      res.innerHTML=`<div class="alert alert-green">✓ ${fn} ${ln} angelegt!<br>Login: ${email}</div>`;
    }catch(e){res.innerHTML=`<div class="alert alert-red">Fehler: ${e.message}</div>`;}
  }else{res.innerHTML='<div class="alert alert-amber">Demo-Modus: nicht gespeichert.</div>';}
}

// ─── STUDENT ────────────────────────────────────────────
let activeMs=null;

function buildStudent(){
  document.getElementById('tb-page').textContent='Schüler';
  const isEN=CU?.sprache==='EN';
  document.getElementById('app-body').innerHTML=`
    <div style="flex:1;overflow-y:auto;">
      <div class="student-hero">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
          <div style="width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;">${(CU?.vorname||'?')[0]}${(CU?.nachname||'')[0]||''}</div>
          <div><div style="font-family:var(--serif);font-size:20px;">${isEN?'Hello':'Hallo'}, ${CU?.vorname}!</div>
          <div style="font-size:12px;opacity:.75;">Bili Learning · ${DEMO?'Demo':'Supabase 🇨🇭'}</div></div>
        </div>
        <div class="xp-wrap"><div class="xp-fill" id="xp-bar" style="width:30%"></div></div>
      </div>
      <div style="padding:16px;max-width:600px;margin:0 auto;">
        <div class="tabs">
          <div class="tab active" id="stab-ueben" onclick="sTab('ueben')">${isEN?'Practice':'Üben'}</div>
          <div class="tab" id="stab-fort" onclick="sTab('fort')">${isEN?'Progress':'Fortschritt'}</div>
        </div>
        <div id="s-content"></div>
      </div>
    </div>`;
  sTab('ueben');
}

async function sTab(t){
  document.querySelectorAll('.tab[id^="stab-"]').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('stab-'+t);if(el)el.classList.add('active');
  t==='ueben'?await renderSUeben():await renderSFort();
}

async function renderSUeben(){
  const c=document.getElementById('s-content');
  if(activeMs){c.innerHTML=sTBox();genTask(activeMs);return;}
  let msStatus={};
  if(!DEMO&&sb&&CU?.id){const{data}=await sb.from('schueler_milestones').select('*').eq('schueler_id',CU.id);(data||[]).forEach(m=>msStatus[m.milestone_id]=m.uebungs_status||0);}
  const getSt=id=>msStatus[id]||0;
  const isEN=CU?.sprache==='EN';
  const sections=[
    {l:isEN?'⚠ Gaps':'⚠ Lücken',items:MS.filter(m=>getSt(m.id)===-1),c:'var(--red)',i:'⚠'},
    {l:isEN?'▶ In progress':'▶ In Arbeit',items:MS.filter(m=>getSt(m.id)===1),c:'var(--amber)',i:'⟳'},
    {l:isEN?'🔓 Ready':'🔓 Bereit',items:MS.filter(m=>getSt(m.id)===0&&(m.pre||[]).every(p=>getSt(p)>=2)),c:'var(--teal)',i:'▶'},
    {l:isEN?'✓ Done':'✓ Erledigt',items:MS.filter(m=>getSt(m.id)>=2),c:'var(--green)',i:'✓'},
    {l:isEN?'🔒 Locked':'🔒 Gesperrt',items:MS.filter(m=>getSt(m.id)===0&&(m.pre||[]).some(p=>getSt(p)<2)),c:'var(--gray-m)',i:'🔒'},
  ].filter(s=>s.items.length);
  c.innerHTML=sections.map(s=>`<div style="margin-bottom:16px;">
    <div style="font-size:10px;font-weight:600;color:${s.c};text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;">${s.l}</div>
    ${s.items.map(m=>{const lk=s.i==='🔒';const dn=getSt(m.id)>=2;return`<div class="ms-card ${lk?'locked':''}" onclick="${lk?'':isDone?'':''}startST('${m.id}')">
      <div style="width:30px;height:30px;border-radius:50%;background:${dn?'var(--green-l)':lk?'var(--gray-l)':'var(--purple-l)'};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">${dn?'✓':lk?'🔒':s.i}</div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${isEN?m.en:m.title}</div><div style="font-size:10px;color:var(--gray-m);">${m.id}</div></div>
      ${!lk?`<span style="font-size:11px;color:var(--teal);">${isEN?'Go →':'Los →'}</span>`:''}
    </div>`;}).join('')}
  </div>`).join('');
}

function startST(msId){activeMs=msId;renderSUeben();}
function sTBox(){return`<div><div style="cursor:pointer;font-size:12px;color:var(--gray-m);margin-bottom:12px;" onclick="activeMs=null;renderSUeben()">← Zurück</div><div id="s-task"><div class="task-box"><div class="loadbar"></div><div style="text-align:center;padding:18px;color:var(--purple);">✦ Aufgabe wird erstellt…</div></div></div></div>`;}

async function genTask(msId){
  const ms=MS.find(m=>m.id===msId);const isEN=CU?.sprache==='EN';
  const prompt=`Friendly math teacher grade 5/6. ONE task for ${CU?.vorname||'student'} (${CU?.sprache||'DE'}). Milestone: ${msId} "${ms?.title}" Bloom: ${ms?.bloom}. Language: ${isEN?'English':'Deutsch'}. Fun real-world context. Respond ONLY JSON: {"context":"","question":"","hint":"","solution":"","steps":[""],"xp":15}`;
  try{
    const r=await fetch(SB_FN+'/anthropic-proxy',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(SB_KEY),'apikey':(SB_KEY)},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const raw=d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    showTask(JSON.parse(raw),ms);
  }catch(e){showTask({context:isEN?"Pizza day!":"Mittagessen: Pizza!",question:isEN?"Max eats 2/8, Sara 3/8. Total?":"Max 2/8, Sara 3/8. Zusammen?",hint:isEN?"Same denominator!":"Gleicher Nenner!",solution:"5/8",steps:["2+3=5","→ 5/8"],xp:15},ms);}
}

function showTask(t,ms){
  const isEN=CU?.sprache==='EN';
  const area=document.getElementById('s-task');if(!area)return;
  const ts=JSON.stringify(t).replace(/"/g,'&quot;');
  area.innerHTML=`<div class="task-box fade-up">
    <div style="display:flex;gap:6px;margin-bottom:8px;"><span class="pill pill-purple">${ms?.id}</span><span class="pill pill-teal">+${t.xp} XP</span></div>
    <div style="font-size:12px;color:var(--gray-m);font-style:italic;margin-bottom:4px;">${t.context}</div>
    <div class="task-prompt">${t.question}</div>
    <textarea class="task-inp" id="s-ans" placeholder="${isEN?'Your answer…':'Deine Antwort…'}"></textarea>
    <div style="display:flex;gap:8px;margin-top:9px;">
      <button class="btn btn-purple btn-sm" onclick="checkAns('${ts}')">✓ ${isEN?'Check':'Prüfen'}</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('s-hint').style.display='block'">${isEN?'Hint':'Tipp'} 💡</button>
    </div>
    <div id="s-hint" style="display:none;margin-top:7px;" class="alert alert-teal">💡 ${t.hint}</div>
    <div id="s-fb"></div>
  </div>
  <div class="card" style="margin-top:10px;">
    <div class="card-title">${isEN?'Solution':'Lösung'}</div>
    <div style="font-weight:600;">${t.solution}</div>
    ${t.steps.map((s,i)=>`<div style="font-size:11px;color:var(--gray-m);margin-top:2px;">${i+1}. ${s}</div>`).join('')}
  </div>`;
}

async function checkAns(ts){
  const t=JSON.parse(ts.replace(/&quot;/g,'"'));
  const ans=document.getElementById('s-ans').value.trim();
  const isEN=CU?.sprache==='EN';
  if(!ans){alert(isEN?'Please write an answer.':'Antwort eingeben.');return;}
  const fb=document.getElementById('s-fb');fb.innerHTML=`<div class="loadbar" style="margin-top:7px;"></div>`;
  try{
    const r=await fetch(SB_FN+'/anthropic-proxy',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(SB_KEY),'apikey':(SB_KEY)},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:180,messages:[{role:'user',content:`Warm feedback for grade 5/6 student ${CU?.vorname||''}. Task: ${t.question} Correct: ${t.solution} Student: ${ans} Language: ${isEN?'English':'Deutsch'} ONLY JSON: {"correct":false,"feedback":""}`}]})});
    const d=await r.json();
    const raw=d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const res=JSON.parse(raw);showFb(res.correct,res.feedback,t.xp);
  }catch(e){const ok=ans.includes(t.solution.split(' ')[0]);showFb(ok,ok?(isEN?'Great!':'Super!'):(isEN?'Try again!':'Nochmal!'),t.xp);}
}

async function showFb(correct,feedback,xp){
  const isEN=CU?.sprache==='EN';
  document.getElementById('s-fb').innerHTML=`<div class="ai-fb fade-up" style="margin-top:9px;">
    <div style="font-size:10px;font-weight:600;color:var(--purple);text-transform:uppercase;margin-bottom:3px;">✦ Feedback</div>
    <div style="font-size:14px;margin-bottom:4px;color:${correct?'var(--green)':'var(--coral)'};">${correct?'🎉 '+(isEN?'Correct!':'Richtig!'):'🤔 '+(isEN?'Almost!':'Fast!')}</div>
    <div>${feedback}</div>
    ${correct?`<div class="alert alert-green" style="margin-top:7px;">+${xp} XP!
      <button class="btn btn-teal btn-sm" style="margin-left:8px;" onclick="giveXP(${xp})">${isEN?'Collect':'Einlösen'}</button>
    </div>`:''}
  </div>`;
}

async function giveXP(xp){
  if(!DEMO&&sb&&CU?.id){const{data}=await sb.from('profiles').select('xp').eq('id',CU.id).single();await sb.from('profiles').update({xp:(data?.xp||0)+xp}).eq('id',CU.id);}
  activeMs=null;buildStudent();
}

async function renderSFort(){
  const c=document.getElementById('s-content');
  const isEN=CU?.sprache==='EN';
  let msStatus={};
  if(!DEMO&&sb&&CU?.id){const{data}=await sb.from('schueler_milestones').select('*').eq('schueler_id',CU.id);(data||[]).forEach(m=>msStatus[m.milestone_id]=m.uebungs_status||0);}
  const getSt=id=>msStatus[id]||0;
  const done=MS.filter(m=>getSt(m.id)>=2).length;
  const pct=Math.round(done/MS.length*100);
  c.innerHTML=`
    <div class="g2" style="margin-bottom:12px;">
      <div class="card"><div style="font-size:26px;font-weight:700;color:var(--teal);font-family:var(--serif);">${pct}%</div>
        <div style="font-size:12px;color:var(--gray-m);">${isEN?'Overall':'Gesamt'}</div>
        <div class="progress-bar" style="margin-top:6px;height:7px;"><div class="progress-fill" style="width:${pct}%;background:var(--teal)"></div></div></div>
      <div class="card"><div style="font-size:26px;font-weight:700;color:var(--purple);font-family:var(--serif);">${done}/${MS.length}</div>
        <div style="font-size:12px;color:var(--gray-m);">Milestones</div></div>
    </div>
    ${[...new Set(MS.map(m=>m.unit))].map(u=>{
      const ms=MS.filter(m=>m.unit===u);const d=ms.filter(m=>getSt(m.id)>=2).length;const p=Math.round(d/ms.length*100);
      return`<div class="card" style="margin-bottom:9px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;"><span style="font-weight:500;">${u}</span><span style="color:var(--gray-m);">${d}/${ms.length}</span></div>
        <div class="progress-bar" style="margin-bottom:6px;"><div class="progress-fill" style="width:${p}%;background:var(--teal)"></div></div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;">${ms.map(m=>{const st=getSt(m.id);return`<span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${st>=2?'var(--green-l)':st===1?'var(--amber-l)':st===-1?'var(--red-l)':'var(--gray-l)'};color:${st>=2?'var(--green)':st===1?'var(--amber)':st===-1?'var(--red)':'var(--gray-m)'};">${m.id}</span>`;}).join('')}</div>
      </div>`;}).join('')}`;
}

// ─── BOOT ────────────────────────────────────────────────
async function boot(){
  initSB();
  if(sb){
    const{data:{session}}=await sb.auth.getSession();
    if(session){await loadProfile(session.user.id);launch();return;}
  }
  document.getElementById('login-screen').style.display='flex';
}

boot();
</script>
</body>
</html>
